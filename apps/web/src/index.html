<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线代码编辑器 - Online Coding Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1e1e1e;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }
        
        #toolbar {
            flex-shrink: 0;
        }
        
        #editor {
            flex: 1;
            min-height: 0;
        }
        
        #status-bar {
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="toolbar"></div>
    <div id="editor"></div>
    <div id="status-bar"></div>
</div>

<!-- 使用本地 Monaco Editor -->
<script src="../node_modules/monaco-editor/min/vs/loader.js"></script>

<script>
// 等待 Monaco 加载
function waitForMonaco() {
    return new Promise((resolve) => {
        if (typeof window.monaco !== 'undefined') {
            resolve();
        } else {
            const checkInterval = setInterval(() => {
                if (typeof window.monaco !== 'undefined') {
                    clearInterval(checkInterval);
                    resolve();
                }
            }, 100);
        }
    });
}

// 配置 Monaco Environment
function configureMonacoEnvironment() {
    window.MonacoEnvironment = {
        getWorkerUrl: function(moduleId, label) {
            return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                self.MonacoEnvironment = {
                    baseUrl: '../node_modules/monaco-editor/min/'
                };
                importScripts('../node_modules/monaco-editor/min/vs/base/worker/workerMain.js');
            `)}`;
        }
    };
}

// 注册语言支持
function registerLanguageSupport() {
    const monaco = window.monaco;
    
    // JavaScript/TypeScript 补全
    const jsCompletions = [
        { label: 'console.log', kind: monaco.languages.CompletionItemKind.Function, insertText: 'console.log(${1:message})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '输出日志' },
        { label: 'console.error', kind: monaco.languages.CompletionItemKind.Function, insertText: 'console.error(${1:error})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '输出错误' },
        { label: 'setTimeout', kind: monaco.languages.CompletionItemKind.Function, insertText: 'setTimeout(() => {\n\t${1}\n}, ${2:delay})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '延迟执行' },
        { label: 'fetch', kind: monaco.languages.CompletionItemKind.Function, insertText: 'fetch(${1:url}).then(r => r.json()).then(d => ${2})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '网络请求' },
        { label: 'Promise', kind: monaco.languages.CompletionItemKind.Class, insertText: 'new Promise((resolve, reject) => {\n\t${1}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '创建 Promise' },
        { label: 'async/await', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'async function ${1:name}() {\n\ttry {\n\t\tconst result = await ${2}\n\t\treturn result\n\t} catch (error) {\n\t\tconsole.error(error)\n\t}\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '异步函数' },
        { label: 'forEach', kind: monaco.languages.CompletionItemKind.Method, insertText: '.forEach((item, index) => {\n\t${1}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '数组遍历' },
        { label: 'map', kind: monaco.languages.CompletionItemKind.Method, insertText: '.map((item, index) => {\n\t${1}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '数组映射' },
        { label: 'filter', kind: monaco.languages.CompletionItemKind.Method, insertText: '.filter((item, index) => {\n\t${1}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '数组过滤' },
        { label: 'class', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'class ${1:ClassName} {\n\tconstructor(${2:params}) {\n\t\t${3}\n\t}\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '类定义' },
        { label: 'function', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'function ${1:name}(${2:params}) {\n\t${3}\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '函数定义' },
    ];

    monaco.languages.registerCompletionItemProvider('javascript', {
        provideCompletionItems: (model, position) => {
            const word = model.getWordUntilPosition(position);
            const range = {
                startLineNumber: position.lineNumber,
                endLineNumber: position.lineNumber,
                startColumn: word.startColumn,
                endColumn: word.endColumn
            };
            return {
                suggestions: jsCompletions.map(item => ({ ...item, range }))
            };
        }
    });

    // TypeScript 使用相同的补全
    monaco.languages.registerCompletionItemProvider('typescript', {
        provideCompletionItems: (model, position) => {
            const word = model.getWordUntilPosition(position);
            const range = {
                startLineNumber: position.lineNumber,
                endLineNumber: position.lineNumber,
                startColumn: word.startColumn,
                endColumn: word.endColumn
            };
            return {
                suggestions: jsCompletions.map(item => ({ ...item, range }))
            };
        }
    });

    // Python 补全
    const pythonCompletions = [
        { label: 'print', kind: monaco.languages.CompletionItemKind.Function, insertText: 'print(${1:message})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '打印输出' },
        { label: 'range', kind: monaco.languages.CompletionItemKind.Function, insertText: 'range(${1:start}, ${2:stop})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '数字序列' },
        { label: 'len', kind: monaco.languages.CompletionItemKind.Function, insertText: 'len(${1:obj})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '获取长度' },
        { label: 'for loop', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'for ${1:item} in ${2:iterable}:\n\t${3}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'for 循环' },
        { label: 'function', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'def ${1:func_name}(${2:params}):\n\t"""${3:docstring}"""\n\t${4}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '函数定义' },
        { label: 'class', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'class ${1:ClassName}:\n\tdef __init__(self, ${2:params}):\n\t\tself.${3} = ${3}\n\t\n\tdef ${4:method}(self):\n\t\t${5}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: '类定义' },
    ];

    monaco.languages.registerCompletionItemProvider('python', {
        provideCompletionItems: (model, position) => {
            const word = model.getWordUntilPosition(position);
            const range = {
                startLineNumber: position.lineNumber,
                endLineNumber: position.lineNumber,
                startColumn: word.startColumn,
                endColumn: word.endColumn
            };
            return {
                suggestions: pythonCompletions.map(item => ({ ...item, range }))
            };
        }
    });

    console.log('✅ Language support registered');
}

// 工具栏
class Toolbar {
    constructor(containerId, callbacks) {
        this.container = document.getElementById(containerId);
        this.callbacks = callbacks;
        this.render();
    }

    render() {
        this.container.innerHTML = `
            <div style="
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px;
                background: #2d2d2d;
                border-bottom: 1px solid #3e3e3e;
            ">
                <button id="btn-format" style="
                    padding: 6px 12px;
                    background: #0e639c;
                    color: white;
                    border: none;
                    border-radius: 3px;
                    cursor: pointer;
                    font-size: 13px;
                ">✨ 格式化</button>
                
                <button id="btn-reset" style="
                    padding: 6px 12px;
                    background: #6c757d;
                    color: white;
                    border: none;
                    border-radius: 3px;
                    cursor: pointer;
                    font-size: 13px;
                "> 重置</button>
                
                <select id="language-select" style="
                    padding: 6px 12px;
                    background: #3c3c3c;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 3px;
                    cursor: pointer;
                    font-size: 13px;
                ">
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                </select>
                
                <button id="btn-theme" style="
                    padding: 6px 12px;
                    background: #5a3e8e;
                    color: white;
                    border: none;
                    border-radius: 3px;
                    cursor: pointer;
                    font-size: 13px;
                ">🎨 切换主题</button>
                
                <button id="btn-save" style="
                    padding: 6px 12px;
                    background: #28a745;
                    color: white;
                    border: none;
                    border-radius: 3px;
                    cursor: pointer;
                    font-size: 13px;
                    margin-left: auto;
                ">💾 保存 (Ctrl+S)</button>
            </div>
        `;

        this.bindEvents();
    }

    bindEvents() {
        document.getElementById('btn-format')?.addEventListener('click', () => {
            this.callbacks.format?.();
        });

        document.getElementById('btn-reset')?.addEventListener('click', () => {
            this.callbacks.reset?.();
        });

        document.getElementById('btn-theme')?.addEventListener('click', () => {
            this.callbacks.themeChange?.();
        });

        document.getElementById('btn-save')?.addEventListener('click', () => {
            this.callbacks.save?.();
        });

        document.getElementById('language-select')?.addEventListener('change', (e) => {
            this.callbacks.languageChange?.(e.target.value);
        });
    }
}

// 状态栏
class StatusBar {
    constructor(containerId) {
        this.container = document.getElementById(containerId);
        this.render();
    }

    render() {
        this.container.innerHTML = `
            <div style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 5px 10px;
                background: #007acc;
                color: white;
                font-size: 12px;
            ">
                <span id="status-language">JavaScript</span>
                <span id="status-position">Ln 1, Col 1</span>
                <span id="status-message">就绪</span>
            </div>
        `;
    }

    updateLanguage(language) {
        const el = document.getElementById('status-language');
        if (el) el.textContent = language.charAt(0).toUpperCase() + language.slice(1);
    }

    updatePosition(line, column) {
        const el = document.getElementById('status-position');
        if (el) el.textContent = `Ln ${line}, Col ${column}`;
    }

    updateMessage(message) {
        const el = document.getElementById('status-message');
        if (el) el.textContent = message;
    }
}

// 默认代码模板
const defaultCode = {
    javascript: `// JavaScript 示例
console.log("Hello, World!");

function add(a, b) {
  return a + b;
}

const result = add(10, 20);
console.log('Result:', result);`,
    typescript: `// TypeScript 示例
interface User {
  name: string;
  age: number;
}

function greet(user: User): string {
  return \`Hello, \${user.name}!\`;
}

const user: User = { name: "Alice", age: 25 };
console.log(greet(user));`,
    python: `# Python 示例
def greet(name):
    return f"Hello, {name}!"

print(greet("World"))`,
    java: `// Java 示例
public class Main {
    public static void main(String[] args) {
        System.out.println("Hello, World!");
    }
}`,
    cpp: `// C++ 示例
#include <iostream>
using namespace std;

int main() {
    cout << "Hello, World!" << endl;
    return 0;
}`,
    go: `// Go 示例
package main

import "fmt"

func main() {
    fmt.Println("Hello, World!")
}`,
    rust: `// Rust 示例
fn main() {
    println!("Hello, World!");
}`
};

// 主应用
async function initApp() {
    try {
        // 等待 Monaco 加载
        await waitForMonaco();
        
        // 配置环境
        configureMonacoEnvironment();
        
        // 加载 Monaco
        await new Promise((resolve, reject) => {
            require(['vs/editor/editor.main'], resolve, reject);
        });

        const monaco = window.monaco;

        // 注册语言支持
        registerLanguageSupport();

        // 创建编辑器
        const editor = monaco.editor.create(
            document.getElementById('editor'),
            {
                value: defaultCode.javascript,
                language: 'javascript',
                theme: 'vs-dark',
                fontSize: 14,
                minimap: { enabled: false },
                wordWrap: 'on',
                tabSize: 2,
                automaticLayout: true,
                scrollBeyondLastLine: true,
                renderWhitespace: 'selection',
                folding: true,
                lineNumbers: 'on',
                roundedSelection: true
            }
        );

        // 创建 UI 组件
        let currentTheme = 'vs-dark';
        let currentLanguage = 'javascript';
        const themes = ['vs', 'vs-dark', 'hc-black'];

        const statusBar = new StatusBar('status-bar');
        const toolbar = new Toolbar('toolbar', {
            format: () => {
                editor.getAction('editor.action.formatDocument')?.run();
                statusBar.updateMessage('✨ 代码已格式化');
            },
            reset: () => {
                editor.setValue(defaultCode[currentLanguage]);
                statusBar.updateMessage('🔄 编辑器已重置');
            },
            themeChange: () => {
                const currentIndex = themes.indexOf(currentTheme);
                currentTheme = themes[(currentIndex + 1) % themes.length];
                monaco.editor.setTheme(currentTheme);
                statusBar.updateMessage(`🎨 主题已切换为: ${currentTheme}`);
            },
            save: () => {
                const code = editor.getValue();
                localStorage.setItem('online-coding-content', code);
                localStorage.setItem('online-coding-language', currentLanguage);
                statusBar.updateMessage('💾 代码已保存');
                console.log('已保存代码:', code);
            },
            languageChange: (lang) => {
                currentLanguage = lang;
                const model = editor.getModel();
                if (model) {
                    monaco.editor.setModelLanguage(model, lang);
                }
                editor.setValue(defaultCode[lang] || defaultCode.javascript);
                statusBar.updateLanguage(lang);
                statusBar.updateMessage(`📝 语言已切换为: ${lang}`);
            }
        });

        // 绑定编辑器事件
        editor.onDidChangeModelContent(() => {
            statusBar.updateMessage('编辑中...');
        });

        editor.onDidChangeCursorPosition((e) => {
            statusBar.updatePosition(e.position.lineNumber, e.position.column);
        });

        // Ctrl+S 快捷键
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
            const code = editor.getValue();
            localStorage.setItem('online-coding-content', code);
            localStorage.setItem('online-coding-language', currentLanguage);
            statusBar.updateMessage('💾 代码已保存 (Ctrl+S)');
        });

        // 加载保存的代码
        const savedCode = localStorage.getItem('online-coding-content');
        const savedLanguage = localStorage.getItem('online-coding-language');
        if (savedCode) {
            editor.setValue(savedCode);
        }
        if (savedLanguage) {
            currentLanguage = savedLanguage;
            const model = editor.getModel();
            if (model) {
                monaco.editor.setModelLanguage(model, savedLanguage);
            }
            statusBar.updateLanguage(savedLanguage);
        }

        console.log('🎉 Online Coding Platform initialized successfully!');
        statusBar.updateMessage('就绪');

    } catch (error) {
        console.error('❌ Failed to initialize application:', error);
    }
}

// 启动应用
window.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
